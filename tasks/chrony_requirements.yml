- name: chrony_requirements | Check if NTP service exists
  shell: "systemctl is-active {{ chrony_ntp_service_name }}.service || systemctl is-enabled {{ chrony_ntp_service_name }}.service"
  register: _ntp_service_check_
  failed_when: false
  changed_when: false

- name: chrony_requirements | Stop and disable NTP service
  service:
      name: "{{ chrony_ntp_service_name }}"
      state: stopped
      enabled: false
  when: >
    not ansible_check_mode and
    _ntp_service_check_.rc is defined and
    _ntp_service_check_.rc == 0

- name: chrony_requirements | Check if systemd-timesyncd service exists
  shell: "systemctl is-active {{ chrony_systemd_timesyncd_service_name }}.service || systemctl is-enabled {{ chrony_systemd_timesyncd_service_name }}.service"
  register: _systemd_timesyncd_service_check_
  failed_when: false
  changed_when: false
  
- name: chrony_requirements | Stop and disable systemd-timesyncd service
  service:
      name: "{{ chrony_systemd_timesyncd_service_name }}"
      state: stopped
      enabled: false
  when: >
    not ansible_check_mode and
    _systemd_timesyncd_service_check_.rc is defined and
    _systemd_timesyncd_service_check_.rc == 0