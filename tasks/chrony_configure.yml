- name: chrony_configure | Enable chrony service on system startup
  service:
    name: "{{ chrony_service_name }}"
    enabled: true
  when: >
    chrony_service_enabled | default(false)

- name: chrony_configure | Disable chrony service on system startup
  service:
    name: "{{ chrony_service_name }}"
    enabled: false
  when: >
    not chrony_service_enabled | default(false)
    
- name: chrony_configure | Deploy chrony configuration file
  template:
    src: "chrony/chrony.conf.j2"
    dest: "{{ chrony_config_path }}"
    mode: 0644
    owner: root
    group: root
  notify: Handler | Restart chrony service

- name: chrony_configure | Check whether the log directory exists
  stat:
    path: "{{ chrony_logdir_path  }}"
  register: _log_directory_stat_

- name: chrony_configure | Create log directory if does not exists
  file:
    path: "{{ chrony_logdir_path }}"
    state: directory
    mode: 0750
    group: "{{ chrony_log_directory_user }}"
    owner: "{{ chrony_log_directory_user }}"
  when: >
    not _log_directory_stat_.stat.exists

- name: chrony_configure | Flush handlers
  meta: flush_handlers