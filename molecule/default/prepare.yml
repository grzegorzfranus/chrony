---
- name: molecule | Prepare
  hosts: all
  gather_facts: true

  tasks:

    - name: Prepare | Update apt cache
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      when: >
        ansible_os_family == "Debian"

    - name: Prepare | Update dnf cache
      ansible.builtin.dnf:
        update_cache: true
      changed_when: false
      when: >
        ansible_os_family == "RedHat"

    - name: Prepare | Install python3.12 package
      ansible.builtin.package:
        name: "python3.12"
        state: present

    - name: Prepare | Set python3.12 as default python
      ansible.builtin.alternatives:
        name: python3
        path: /usr/bin/python3.12
        state: present
