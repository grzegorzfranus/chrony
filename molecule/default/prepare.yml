---
- name: molecule | Prepare
  hosts: all
  gather_facts: true

  tasks:

    - name: Prepare | Update apt cache
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      when: >
        ansible_os_family == "Debian"

    - name: Prepare | Update dnf cache
      ansible.builtin.dnf:
        update_cache: true
      changed_when: false
      when: >
        ansible_os_family == "RedHat"

    - name: Prepare | Install sudo package
      ansible.builtin.package:
        name: sudo
        state: present

    - name: Prepare | Ensure sudoers.d directory exists
      ansible.builtin.file:
        path: /etc/sudoers.d
        state: directory
        mode: '0755'

    - name: Prepare | Configure sudo for ansible user
      ansible.builtin.copy:
        content: |
          # Allow ansible user to run all commands without password
          ansible ALL=(ALL) NOPASSWD: ALL
          # Allow ansible user to use sudo without password
          Defaults:ansible !requiretty
        dest: /etc/sudoers.d/ansible
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Prepare | Ensure ansible user exists
      ansible.builtin.user:
        name: ansible
        state: present
        shell: /bin/bash
        create_home: true
