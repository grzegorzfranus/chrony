---
role_name_check: 1
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu24
    image: "ubuntu:24.04"
    dockerfile: ./Dockerfile.ubuntu24
    privileged: false
    pre_build_image: false
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ansible_extra_vars:
      ansible_python_interpreter: /usr/bin/python3
  - name: debian12
    image: "debian:12"
    dockerfile: ./Dockerfile.debian12
    privileged: false
    pre_build_image: false
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ansible_extra_vars:
      ansible_python_interpreter: /usr/bin/python3
  - name: centos9
    image: "quay.io/centos/centos:stream9"
    dockerfile: ./Dockerfile.centos9
    privileged: false
    pre_build_image: false
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ansible_extra_vars:
      ansible_python_interpreter: /usr/bin/python3
  - name: rocky9
    image: "rockylinux:9"
    dockerfile: ./Dockerfile.rocky9
    privileged: false
    pre_build_image: false
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ansible_extra_vars:
      ansible_python_interpreter: /usr/bin/python3

provisioner:
  name: ansible
  options:
    vvv: true
  playbooks:
    converge: converge.yml

verifier:
  name: testinfra

lint: |
  set -e
  ansible-lint --config=.ansible-lint
