---
- name: molecule | Prepare
  hosts: all
  gather_facts: true

  tasks:

    - name: Prepare | Update apt cache
      become: true
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      when: >
        ansible_os_family == "Debian"

    - name: Prepare | Update dnf cache
      become: true
      ansible.builtin.dnf:
        update_cache: true
      changed_when: false
      when: >
        ansible_os_family == "RedHat"

    - name: Prepare | Install python3.12 package
      become: true
      ansible.builtin.package:
        name: "python3.12"
        state: present
