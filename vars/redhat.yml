---
### =======================
### RedHat specified variables

# NTP service name
chrony_ntp_service_name: "ntpd"
# systemd-timesyncd service name
chrony_systemd_timesyncd_service_name: "systemd-timesyncd"
# Chrony config file location
chrony_config_path: "/etc/chrony.conf"
# log file user / log directory owner
chrony_log_directory_user: "chrony"


### =======================
### Configuration options for Chrony

# Where to store the file that records the rate at which the system clock
# gains/losses time.
chrony_driftfile_path: "/var/lib/chrony/drift"
# Specify path to the file containing keys for NTP authentication
chrony_keyfile_path: "/etc/chrony.keys"
