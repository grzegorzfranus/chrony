---
- name: install | Update package cache (Debian-based)
  ansible.builtin.apt:
    update_cache: yes
  when: >
    ansible_os_family | lower == "debian"

- name: install | Update package cache (RedHat-based)
  ansible.builtin.dnf:
    update_cache: yes
  when: >
    ansible_os_family | lower == "redhat"

- name: install | Install Chrony package
  become: true
  ansible.builtin.package:
    name: "{{ chrony_package_name }}"
    state: present
